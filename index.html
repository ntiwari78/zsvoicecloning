let currentYear = 'all', currentCat = 'all';

function applyFilters() {
    const q = document.getElementById('searchBox').value.toLowerCase();
    let fp = papers.filter(p => {
        if (currentYear === 'pre2023' && p.year > 2022) return false;
        if (currentYear !== 'all' && currentYear !== 'pre2023' && p.year !== +currentYear) return false;
        if (currentCat !== 'all' && p.cat !== currentCat) return false;
        if (q) {
            const s = `${p.title} ${p.authors} ${p.venue} ${p.id}`.toLowerCase();
            if (!s.includes(q)) return false;
        }
        return true;
    });
    const sort = document.getElementById('sortSelect').value;
    fp.sort((a,b) => {
        if (sort==='year-desc') return b.year-a.year || a.title.localeCompare(b.title);
        if (sort==='year-asc') return a.year-b.year || a.title.localeCompare(b.title);
        if (sort==='title') return a.title.localeCompare(b.title);
        if (sort==='key') return a.id.localeCompare(b.id);
        return 0;
    });
    render(fp);
}

function render(fp) {
    const c = document.getElementById('papersContainer');
    const nr = document.getElementById('noResults');
    document.getElementById('resultsInfo').textContent =
        `Showing ${fp.length} of ${papers.length} references` +
        (currentYear!=='all' ? ` \u2022 Year: ${currentYear==='pre2023'?'\u22642022':currentYear}` : '') +
        (currentCat!=='all' ? ` \u2022 ${catLabels[currentCat]||currentCat}` : '');
    if (!fp.length) { c.innerHTML=''; nr.classList.remove('hidden'); return; }
    nr.classList.add('hidden');
    const groups = {};
    fp.forEach(p => { (groups[p.year] = groups[p.year]||[]).push(p); });
    const years = Object.keys(groups).sort((a,b)=>b-a);
    c.innerHTML = years.map(y => `
        <div class="year-group">
            <div class="year-header"><span>${y}</span><span class="year-count">${groups[y].length} ref${groups[y].length>1?'s':''}</span></div>
            <div class="papers-container">${groups[y].map(p => `
                <div class="paper-card">
                    <div class="paper-header">
                        <div class="paper-title">${p.title}</div>
                        <div class="paper-year">${p.year}</div>
                    </div>
                    <div class="paper-meta">
                        <span class="paper-category cat-${p.cat}">${catLabels[p.cat]||p.cat}</span>
                        <span class="paper-venue">${p.venue}</span>
                        <span class="bib-key">${p.id}</span>
                    </div>
                    <div class="paper-authors"><strong>Authors:</strong> ${p.authors}</div>
                    <div class="paper-links">
                        ${p.url ? `<a href="${p.url}" target="_blank" rel="noopener" class="paper-link">Paper</a>` : ''}
                    </div>
                </div>`).join('')}
            </div>
        </div>`).join('');
}

function buildStats() {
    const sc = document.getElementById('statsContainer');
    const y26 = papers.filter(p=>p.year>=2025).length;
    const y24 = papers.filter(p=>p.year===2024).length;
    const y23 = papers.filter(p=>p.year===2023).length;
    const ypre = papers.filter(p=>p.year<=2022).length;
    sc.innerHTML = [
        [papers.length,'Total References'],
        [y26,'2025\u20132026'],
        [y24,'2024'],
        [y23,'2023'],
        [ypre,'\u22642022']
    ].map(([n,l])=>`<div class="stat-card"><span class="stat-number">${n}</span><span class="stat-label">${l}</span></div>`).join('');
}

document.querySelectorAll('#yearFilters .filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('#yearFilters .filter-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        currentYear = btn.dataset.year;
        applyFilters();
    });
});
document.querySelectorAll('#categoryFilters .filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('#categoryFilters .filter-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        currentCat = btn.dataset.cat;
        applyFilters();
    });
});
document.getElementById('searchBox').addEventListener('input', applyFilters);
document.getElementById('sortSelect').addEventListener('change', applyFilters);

function exportBibTeX() {
    let bib = '% Voice Cloning Survey Bibliography\n\n';
    papers.forEach(p => {
        bib += `@article{${p.id},\n  title={${p.title}},\n  author={${p.authors}},\n  year={${p.year}},\n  journal={${p.venue}}${p.url?`,\n  url={${p.url}}`:''}\n}\n\n`;
    });
    download(bib, 'voice_cloning_refs.bib', 'text/plain');
}
function exportJSON() {
    download(JSON.stringify(papers,null,2), 'voice_cloning_refs.json', 'application/json');
}
function download(content, name, type) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([content],{type}));
    a.download = name;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

buildStats();
applyFilters();
</script>
